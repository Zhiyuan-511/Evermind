    `#ffffff` as page background with no accent or gradient is auto-rejected.
    Use warm-tinted darks (`#0c0a14`, `#1a1620`, `#0a1f1a`), airy off-whites
    (`#f7f4ee`, `#fafaf6`, `#f5ede1`), or saturated brand backgrounds.

  - **Section rhythm** — alternate at least 2 distinct surface treatments
    (e.g. cream/charcoal, gradient/solid, light/dark) to create visual
    tempo. Painting every section identical = REJECT.

  - **Visual interest elements (≥2)** — pick 2+ from: animated gradient
    orbs (radial-gradient ::before with @keyframes drift), CSS noise texture
    overlay (SVG turbulence), CSS art SVG accents, glassmorphism cards
    (`backdrop-filter: blur(20px)` + translucent surface), soft glow
    shadows (`0 0 40px var(--accent)`), pattern fills (dot grid, lines).

  - **Typography pairing** — serif heading + sans body, OR display sans +
    grotesk body. Pure system-ui everywhere = generic AI smell. At least
    one font carries personality (Playfair Display / Fraunces / Manrope /
    Space Grotesk / IBM Plex Serif as system-stack fallbacks via
    `font-family: "...", -apple-system, ...`).

  - **Accent saturation** — primary or accent color MUST be saturated
    (HSL saturation ≥ 60%). Pure-grayscale palettes are forbidden unless
    the brief literally says "monochrome" or "minimalist B/W photography".
  </v71j_visual_personality_2026>

  <v7_forbidden_list>
  FORBIDDEN (v7.0 — adapted from v0.dev 2025-03-06). Violation = blocker in reviewer:
  - NEVER inline hex colors (`style="color:#..."`). Every color goes through a
    CSS custom property declared in `:root {...}`.
  - NEVER exceed 5 primary color tokens. Extra shades are calc()-derived or
    `color-mix()` tints of the 5; don't introduce more tokens.
  - NEVER use emojis as icons. Inline SVG (24×24 or 32×32) is the only icon
    mechanism. Unicode geometric shapes (●▲◆) are OK as last resort.
  - NEVER use `float:*` for layout. NEVER use `position:absolute` except for
    tooltips / modals / sticky CTAs / small decorative overlays.
  - NEVER use `<br><br>` (or more) as spacing. Margin/padding only.
  - NEVER use remote font CDNs (fonts.googleapis.com / typekit.net). System
    font stack + 1-2 self-hosted woff2 maximum.
  - NEVER use `localStorage` / `sessionStorage` unless the goal explicitly
    asks for persistence.
  - NEVER use `console.log` in production output — remove before writing.
  - NEVER leave `TODO`, `XXX`, `FIXME`, `placeholder`, `lorem ipsum`.
  - NEVER use `alert()` / `confirm()` / `prompt()` for UX — inline messaging.
  </v7_forbidden_list>

  <core_rules>
  1. Complete HTML with matching tags, balanced braces, closed callbacks.
  2. Responsive (@media breakpoints), accessible (lang attr, aria, focus),
     semantic HTML5, CSS vars for theming.
  3. No emoji-as-icons and no CDN libs — inline SVG + inline `<style>` only.
  4. JS: null-guard DOM queries, bind in `<script>` (no inline onclick to
     undeclared globals), try/catch async, per-page element guards.
  5. (v6.7c revision) Continuation/repair passes MUST use `file_ops edit`
     with the smallest possible `old_string` → `new_string` pair. Returning
     a FULL `<!DOCTYPE>…</html>` rewrite on round 2+ is FORBIDDEN — the
     orchestrator's post_write_full_rewrite_loop guard will cut your stream
     at streak=1 (observed 2026-04-23 saved 4 of 4 builders from a 4×HTML
     rewrite spiral). Fragment edits are the ONLY correct repair path.
  </core_rules>

