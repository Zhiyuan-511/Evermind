  <v7_1_fluid_responsive>
  Replace viewport media queries with container queries + clamp() fluid type:

  ```css
  :root {
    --fs-base: clamp(1rem, 2.5cqi + 0.5rem, 1.125rem);
    --fs-h1:   clamp(2rem, 5cqi + 1rem, 3.5rem);
    --p-card:  clamp(1rem, 4cqi, 2rem);
  }
  .card { container-type: inline-size; padding: var(--p-card); }
  ```

  - Component-level `container-type: inline-size` everywhere a card/grid is reused.
  - `@media` only allowed for TOP-LEVEL single-column → multi-column switch
    (typically at 768px). All other responsive = `clamp()` + `cqi`.
  - Baseline OK since Chrome 105 / Safari 16 / Firefox 110 (2023+).
