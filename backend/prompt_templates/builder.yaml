  <v7_motion_mandate>
  Animations & micro-interactions are NOT optional — they are what separates
  a "generic template" from a product. Every non-trivial page MUST include
  AT LEAST 3 of the following motion primitives (choose based on content):

  1. **Scroll-triggered reveals** — IntersectionObserver fades/translates
     sections into view as the user scrolls (opacity 0→1, y translate 20→0).
     Use `prefers-reduced-motion` to disable when set.
  2. **Hover lift / magnet** on primary CTAs — transform: translateY(-2px)
     + shadow intensification; 150-200ms cubic-bezier ease.
  3. **Focus / active states** — every clickable element has a visible
     keyboard-focus ring (2px outline + offset) and :active feedback.
  4. **Hero section intro** — SplitText-style staggered letter reveal OR
     gradient aurora background OR subtle mouse-parallax.
  5. **Image / card transitions** — cards fade/scale in on :hover; images
     smoothly scale 1.02 with overflow:hidden parents.
  6. **Smooth scroll** — `html { scroll-behavior: smooth }` plus anchor
     links offset for sticky headers.
  7. **Number counters** — if the page has stats (金额/用户数/评分), count
     up from 0 to target when scrolled into view.
  8. **Loading states** — button CTAs that submit data show pending state
     (spinner or skeleton), not a frozen click.

  ALL animations MUST:
  - Use `transform` + `opacity` (GPU-accelerated); NEVER animate `width`/
    `height`/`top`/`left`/`margin` (causes layout thrash).
  - Respect `@media (prefers-reduced-motion: reduce) { animation: none; }`
  - Duration 150-400ms for micro-interactions, 600-900ms for scroll reveals.
  - `ease` or `cubic-bezier(0.4, 0, 0.2, 1)` — NEVER `linear` except
    for progress spinners.

  ## v7.1 MOTION RECIPES (copy-paste ready — vanilla JS, no framework)
  Pick the recipe that matches the React-Bits name the designer used:

  **Recipe A: ScrollReveal (IntersectionObserver)**
  ```js
  const io = new IntersectionObserver((entries) => {
    entries.forEach(e => {
      if (e.isIntersecting) { e.target.classList.add('is-visible'); io.unobserve(e.target); }
    });
  }, { threshold: 0.15, rootMargin: '0px 0px -60px 0px' });
  document.querySelectorAll('[data-reveal]').forEach(el => io.observe(el));
  ```
  ```css
  [data-reveal] { opacity: 0; transform: translateY(24px); transition: opacity .6s ease, transform .6s ease; }
  [data-reveal].is-visible { opacity: 1; transform: none; }
  @media (prefers-reduced-motion: reduce) { [data-reveal] { transition: none; opacity: 1; transform: none; } }
  ```

  **Recipe B: Magnet (CTA hover attraction — cuberto inspired)**
  ```js
  document.querySelectorAll('[data-magnet]').forEach(el => {
    el.addEventListener('mousemove', (e) => {
      const r = el.getBoundingClientRect();
      const x = (e.clientX - r.left - r.width / 2) * 0.3;
      const y = (e.clientY - r.top - r.height / 2) * 0.3;
      el.style.transform = `translate(${x}px, ${y}px)`;
    });
    el.addEventListener('mouseleave', () => el.style.transform = '');
  });
  ```

  **Recipe C: CountUp (stat number)**
  ```js
  function countUp(el, to, duration=1800) {
    const start = performance.now();
    (function tick(t) {
      const p = Math.min(1, (t - start) / duration);
      el.textContent = Math.round(to * (1 - Math.pow(1-p, 3)));  // easeOutCubic
      if (p < 1) requestAnimationFrame(tick);
    })(start);
  }
  const stats = document.querySelectorAll('[data-count]');
  const countIO = new IntersectionObserver((entries) => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        countUp(e.target, parseInt(e.target.dataset.count, 10));
        countIO.unobserve(e.target);
      }
    });
  }, { threshold: 0.6 });
  stats.forEach(s => countIO.observe(s));
  ```

  Use the same class/attribute names (`data-reveal` / `data-magnet` /
  `data-count`) verbatim — polisher/debugger/tester will look for these.
  </v7_motion_mandate>

  <v7_code_quality_claude_code>
  Claude-Code-level quality bar — every file you write MUST meet ALL of:

  **HTML semantics**
  - `<main>`, `<header>`, `<footer>`, `<nav>`, `<section>`, `<article>` —
    NEVER use generic `<div>` for top-level structure.
  - Every interactive element has `aria-label` or visible text label.
  - Color contrast meets WCAG AA (≥ 4.5:1 body text, 3:1 large text).
  - `lang="zh-CN"` on `<html>` when user goal is Chinese, `lang="en"`
    otherwise. Mixed content uses `lang=""` override inside.

  **SEO / meta (≥ 6 required)**
  - `<meta charset="UTF-8">`, `<meta name="viewport" content="width=device-width, initial-scale=1">`
  - `<meta name="description" content="..." />` (≥ 50 chars, ≤ 160)
  - `<meta property="og:title">` + `<meta property="og:description">`
    + `<meta property="og:type" content="website">`
  - `<title>` non-empty + unique + ≤ 60 chars.
  - Favicon via inline SVG data URI (no 404).

  **CSS architecture**
  - `:root { --* }` design tokens: at least `--color-primary`, `--color-surface`,
    `--color-text`, `--color-muted`, `--radius`, `--shadow`, `--max-w`.
  - Mobile-first: base rules for phone, `@media (min-width: 768px)` for tablet,
    `@media (min-width: 1024px)` for desktop.
  - No `!important` unless overriding a 3rd-party library.
  - No unused selectors; compose with utility classes (`.u-center`, `.u-stack-6`).

  **JS**
  - Strict: `'use strict';` or ES modules.
  - Every `querySelector` result null-guarded: `if (!el) return;`
  - Event listeners that persist use `{ once: true }` or have explicit
    `removeEventListener` cleanup.
  - No inline `onclick="..."` — all wiring in `<script>` at the end of body.
  - Try/catch around JSON.parse, fetch, localStorage, async functions.

  **Content**
  - Zero `Lorem ipsum`, zero `TODO`, zero `placeholder`, zero `FIXME`,
    zero `XXX`, zero `[image]` text. Every visible string is real copy.
  - Phone/email/address fields have `type="tel"` / `type="email"` /
    proper pattern validation.

  **Performance**
  - No remote font CDNs (system stack). Inline critical CSS.
  - No JavaScript libraries via `<script src="...cdn...">` — inline SVG +
    vanilla JS only unless the goal explicitly requires a framework.
  - Images use `loading="lazy"` below-the-fold + `decoding="async"`.
  </v7_code_quality_claude_code>

