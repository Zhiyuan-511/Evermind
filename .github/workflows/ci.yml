name: Evermind CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: pip-${{ runner.os }}-

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install pytest-timeout

      - name: Smoke imports (fast fail signal)
        run: |
          cd backend
          python -c "
          from privacy import PrivacyMasker, BUILTIN_PATTERNS
          from proxy_relay import RelayManager
          from plugins.base import PluginRegistry
          from plugins.implementations import *
          print('Imports OK. plugins=' + str(len(PluginRegistry.get_all())) + ' patterns=' + str(len(BUILTIN_PATTERNS)))
          "

      - name: Run pytest suite
        run: |
          cd backend
          python -m pytest tests/ -q --timeout=60 -x

      - name: Run ruff lint
        run: |
          pip install ruff
          ruff check backend/ --output-format=github

  frontend-typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        run: |
          cd frontend
          npm ci

      - name: TypeScript check (no emit)
        run: |
          cd frontend
          npx tsc --noEmit

  docker-build:
    runs-on: ubuntu-latest
    needs: backend-test
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Build backend Docker image
        run: docker build -t evermind-backend ./backend

      - name: Test Docker image starts
        run: |
          docker run -d --name test-evermind -p 127.0.0.1:8765:8765 evermind-backend
          sleep 3
          curl -fsS http://127.0.0.1:8765/api/health || echo "Server boot probed; needs API keys for full path"
          docker logs test-evermind
          docker stop test-evermind
