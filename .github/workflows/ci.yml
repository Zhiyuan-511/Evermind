name: Evermind CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Test imports
        run: |
          cd backend
          python -c "
          from privacy import PrivacyMasker, BUILTIN_PATTERNS
          from proxy_relay import RelayManager
          from plugins.base import PluginRegistry
          from plugins.implementations import *
          print('✅ All imports OK')
          print(f'   Plugins: {len(PluginRegistry.get_all())}')
          print(f'   PII patterns: {len(BUILTIN_PATTERNS)}')
          "

      - name: Test privacy masking
        run: |
          cd backend
          python -c "
          from privacy import PrivacyMasker
          m = PrivacyMasker()
          masked, rmap = m.mask('Phone 13812345678 email test@a.com key sk-abcdefghijklmnop12345678')
          assert len(rmap) >= 2, f'Expected >=2 PII, got {len(rmap)}'
          restored = m.unmask(masked, rmap)
          assert 'test@a.com' in restored
          print('✅ Privacy masking: OK')
          "

      - name: Test relay manager
        run: |
          cd backend
          python -c "
          from proxy_relay import RelayManager
          mgr = RelayManager()
          ep = mgr.add('test', 'https://api.test.com/v1', 'sk-test', ['gpt-4o'])
          assert len(mgr.list()) == 1
          models = mgr.get_all_models()
          assert len(models) >= 1
          mgr.remove(ep.id)
          assert len(mgr.list()) == 0
          print('✅ Relay manager: OK')
          "

  docker-build:
    runs-on: ubuntu-latest
    needs: backend-test
    steps:
      - uses: actions/checkout@v4

      - name: Build backend Docker image
        run: docker build -t evermind-backend ./backend

      - name: Test Docker image starts
        run: |
          docker run -d --name test-evermind -p 8765:8765 evermind-backend
          sleep 3
          curl -f http://localhost:8765/api/health || echo "Server may need API keys"
          docker logs test-evermind
          docker stop test-evermind
