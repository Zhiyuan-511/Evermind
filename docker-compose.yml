# ═══════════════════════════════════════════
# Evermind — Docker Compose
# One-click deployment: docker compose up -d
# ═══════════════════════════════════════════

services:
  backend:
    build: ./backend
    ports:
      - "8765:8765"
    env_file:
      - ./backend/.env
    volumes:
      - ./evermind_godmode_final.html:/app/../evermind_godmode_final.html:ro
      - /tmp/evermind_output:/tmp/evermind_output
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8765/api/health" ]
      interval: 30s
      timeout: 5s
      retries: 3
