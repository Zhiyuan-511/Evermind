# ═══════════════════════════════════════════
# Evermind — Docker Compose
# One-shot deploy: docker compose up --build
# Frontend: http://127.0.0.1:3000/editor
# Backend:  http://127.0.0.1:8765
#
# SECURITY: ports are bound to 127.0.0.1 only.
# The backend has NO authentication and exposes shell / file_ops /
# chat-agent tools to anyone who can reach the port. If you need to
# expose this to LAN, you MUST add an auth middleware first.
# ═══════════════════════════════════════════

services:
  backend:
    build: ./backend
    ports:
      - "127.0.0.1:8765:8765"
    environment:
      # Bind only inside the container's localhost interface.
      - HOST=127.0.0.1
      - PORT=8765
      - WORKSPACE=/workspace
      - OUTPUT_DIR=/tmp/evermind_output
      - ALLOWED_DIRS=/workspace,/tmp/evermind_output,/tmp
      - SHELL_TIMEOUT=30
    volumes:
      - /tmp/evermind_output:/tmp/evermind_output
      - evermind_settings:/app/data
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://127.0.0.1:8765/api/health" ]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    build: ./frontend
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOSTNAME=127.0.0.1
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  evermind_settings:
