<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 420px;
            height: 320px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(145deg, #0f1117 0%, #1a1d2e 50%, #0f1117 100%);
            border-radius: 20px;
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif;
            color: #e0e0e0;
            overflow: hidden;
            -webkit-app-region: drag;
        }

        .logo {
            font-size: 56px;
            margin-bottom: 16px;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                transform: scale(1);
                opacity: 1;
            }

            50% {
                transform: scale(1.08);
                opacity: 0.8;
            }
        }

        .title {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(135deg, #6366f1, #a855f7, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
            letter-spacing: 2px;
        }

        .version {
            font-size: 11px;
            color: #666;
            margin-bottom: 24px;
        }

        .status {
            font-size: 12px;
            color: #888;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .spinner {
            width: 14px;
            height: 14px;
            border: 2px solid #333;
            border-top: 2px solid #6366f1;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .bar-container {
            width: 200px;
            height: 3px;
            background: #1e2030;
            border-radius: 2px;
            margin-top: 16px;
            overflow: hidden;
        }

        .bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #6366f1, #a855f7);
            border-radius: 2px;
            animation: loading 8s ease-out forwards;
        }

        @keyframes loading {
            0% {
                width: 0%;
            }

            30% {
                width: 40%;
            }

            60% {
                width: 65%;
            }

            90% {
                width: 85%;
            }

            100% {
                width: 95%;
            }
        }
    </style>
</head>

<body>
    <div class="logo">🧠</div>
    <div class="title">EVERMIND</div>
    <div class="version">v2.0 · Desktop</div>
    <div class="status">
        <div class="spinner"></div>
        <span>正在启动服务...</span>
    </div>
    <div class="bar-container">
        <div class="bar"></div>
    </div>
</body>

</html>
